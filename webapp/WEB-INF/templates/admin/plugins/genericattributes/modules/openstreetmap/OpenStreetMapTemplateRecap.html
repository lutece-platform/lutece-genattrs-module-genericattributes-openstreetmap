<input type="hidden" id="${entry.idEntry}_map_provider" name="${entry.idEntry}_map_provider" value="${entry.mapProvider.key}"/>
<div class="mb-3" id="${entry.idEntry}_waiting" style="display:none;"><p>#i18n{module.genericattributes.openstreetmap.loading}</p></div>
<div class="mb-3">
<div>${addressOpenStreetMap!}</div>
</div>
<div class="mb-3">
<#if lat?? && lon??>
<div id="${entry.idEntry}_gmap" class="col-osm osm-map"></div>
</div>
<link rel="stylesheet" href="js/plugins/genericattributes/modules/openstreetmap/lib/leaflet/leaflet.css" />
<script src="js/plugins/genericattributes/modules/openstreetmap/lib/leaflet/leaflet.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
	const lat = '${lat!}';
	const lon = '${lon!}';

	const map = L.map('${entry.idEntry}_gmap').setView([lat, lon], 10);
	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	}).addTo(map);
	const addressField = document.getElementById('${entry.idEntry}_address');
	if (addressField) {
		addressField.addEventListener('keypress', function (event) {
			if (event.keyCode === 13) { // Enter button
				event.preventDefault();
				document.getElementById('${entry.idEntry}_gmap_button').click();
			}
		});
	}

	const location = new L.LatLng(lat, lon);
	const marker = L.marker(location).addTo(map);
	map.panTo(location);
	map.setZoom(15);
});

</script>
<noscript>#i18n{module.genericattributes.openstreetmap.javascript.disabled}</noscript>
</#if>
